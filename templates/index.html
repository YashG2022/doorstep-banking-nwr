<!DOCTYPE html>
<html>
<head>
    <title>Reconciliation Upload</title>
    <style>
        body {
            font-family: Arial;
            padding: 40px;
        }
        .container {
            max-width: 500px;
            margin: auto;
        }
        input, button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Upload Files</h2>

    <form id="uploadForm">
        <label>TXT File:</label>
        <input type="file" name="txt" required>

        <label>Excel File:</label>
        <input type="file" name="excel" required>

        <button type="submit">Upload</button>
    </form>

    <p id="result"></p>
</div>

<script>
document.getElementById("uploadForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    const response = await fetch("/upload", {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    document.getElementById("result").innerText =
        "✅ " + data.message + " | Records: " + data.records;
});
</script>

</body>
</html>
