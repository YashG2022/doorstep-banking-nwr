<!DOCTYPE html>
<html>

<head>
    <title>Data App</title>
    <script src="/static/script.js"></script>
</head>

<body>

    <h2>Data Processing App</h2>

    <button onclick="showTab('upload')">Upload</button>
    <button onclick="showTab('dashboard')">Dashboard</button>

    <div id="upload" class="tab active">
        <h3>Upload Files</h3>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="txt" required><br><br>
            <input type="file" name="excel" required><br><br>
            <button type="submit">Process</button>
        </form>
    </div>

    <div id="dashboard" class="tab">
        <iframe src="/dashboard" width="100%" height="500px"></iframe>
    </div>

</body>

</html>
