<!DOCTYPE html>
<html>

<head>
    <title>Reconciliation Upload</title>
    <style>
        body {
            font-family: Arial;
            padding: 40px;
        }

        .container {
            max-width: 500px;
            margin: auto;
        }

        input,
        button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Upload Files</h2>

        <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data">
            <label>TXT File:</label>
            <input type="file" name="txt" required>

            <label>Excel File:</label>
            <input type="file" name="excel" required>

            <button type="submit">Upload</button>
        </form>

        <p id="result"></p>
    </div>
</body>

</html>
