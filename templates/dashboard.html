<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top left, #e0e7ff, transparent 40%),
                radial-gradient(circle at bottom right, #fbcfe8, transparent 40%),
                #f8fafc;
        }

        /* PAGE WRAPPER */
        .page {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
        }

        /* HEADER */
        h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #111827;
        }

        h3 {
            margin-bottom: 12px;
            color: #6b7280;
            font-weight: 500;
        }

        /* FILTER */
        .filter-container {
            margin-bottom: 30px;
        }

        .filter-container a {
            text-decoration: none;
        }

        .filter-container button {
            padding: 10px 18px;
            border-radius: 25px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            margin-right: 10px;
            transition: all 0.25s ease;
            font-weight: 500;
        }

        .filter-container button:hover {
            border-color: #6366f1;
            color: #6366f1;
        }

        /* ACTIVE BUTTON */
        .filter-container button[style] {
            background: linear-gradient(135deg, #6366f1, #8b5cf6) !important;
            color: white !important;
            border: none;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        /* CARDS */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .cards div {
            background: #ffffff;
            padding: 22px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            transition: all 0.25s ease;
            border: 1px solid #f1f1f1;
            position: relative;
        }

        .cards div:hover {
            transform: translateY(-5px);
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.1);
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }


        /* VALUE */
        .cards div strong {
            display: block;
            font-size: 26px;
            margin-top: 6px;
            font-weight: 600;
            color: #111827;
        }

        /* COLOR ACCENTS */
        .cards div:nth-child(1) {
            border-left: 5px solid #6366f1;
        }

        .cards div:nth-child(2) {
            border-left: 5px solid #22c55e;
        }

        .cards div:nth-child(3) {
            border-left: 5px solid #ef4444;
        }

        .cards div:nth-child(4) {
            border-left: 5px solid #f59e0b;
        }

        .cards div:nth-child(5) {
            border-left: 5px solid #8b5cf6;
        }

        /* DOWNLOAD SECTION */
        .download-container {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .download-container a {
            text-decoration: none;
        }

        .download-container button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            cursor: pointer;
            margin-right: 12px;
            transition: all 0.25s ease;
            font-weight: 500;
        }

        .download-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>

<body>

    <div class="page">

        <h2>📊 Dashboard</h2>

        <!-- FILTER -->
        <h3>Filter</h3>

        <div class="filter-container">
            <a href="/dashboard?range=all">
                <button {% if selected_range=="all" %}style="background:blue;color:white;" {% endif %}>
                    Lifetime
                </button>
            </a>

            <a href="/dashboard?range=latest">
                <button {% if selected_range=="latest" %}style="background:blue;color:white;" {% endif %}>
                    Last Day
                </button>
            </a>

            <a href="/dashboard?range=30days">
                <button {% if selected_range=="30days" %}style="background:blue;color:white;" {% endif %}>
                    Last 30 Days
                </button>
            </a>
        </div>

        <!-- CARDS -->
        <div class="cards">
            <div>Total <strong>{{ summary.total }}</strong></div>
            <div>Matched <strong>{{ summary.matched }}</strong></div>
            <div>Mismatch <strong>{{ summary.mismatched }}</strong></div>
            <div>Missing in Excel <strong>{{ summary.unmatch_excel }}</strong></div>
            <div>Missing in TXT <strong>{{ summary.unmatch_text }}</strong></div>
            <div>Mismatch Amount <strong>₹{{ summary.difference }}</strong></div>
        </div>

        <!-- DOWNLOAD -->
        <h3>⬇ Download Reports</h3>

        <div class="download-container">
            <a href="/download?type=latest">
                <button>Download Latest Day</button>
            </a>

            <a href="/download?type=30days">
                <button>Download Last 30 Days</button>
            </a>
        </div>

    </div>

</body>

</html>
