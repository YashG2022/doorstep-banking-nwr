<!DOCTYPE html>
<html>

<head>
    <title>Results</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top left, #e0e7ff, transparent 40%),
                radial-gradient(circle at bottom right, #fbcfe8, transparent 40%),
                #f8fafc;
            padding: 40px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        h2 {
            font-size: 26px;
            margin-bottom: 25px;
            color: #111827;
        }

        /* CARDS */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            padding: 22px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            transition: 0.25s;
            border-left: 5px solid;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.1);
        }

        .title {
            font-size: 13px;
            color: #6b7280;
        }

        .value {
            font-size: 26px;
            font-weight: 600;
            margin-top: 6px;
            color: #111827;
        }

        /* COLORS */
        .total {
            border-color: #6366f1;
        }

        .matched {
            border-color: #22c55e;
        }

        .mismatch {
            border-color: #ef4444;
        }

        .unmatched {
            border-color: #f59e0b;
        }

        .amount {
            border-color: #8b5cf6;
        }

        /* DOWNLOAD */
        .download-box {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .download-btn {
            padding: 14px 24px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.25s;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        /* BACK */
        .back {
            margin-top: 25px;
            display: inline-block;
            color: #6366f1;
            text-decoration: none;
            font-weight: 500;
        }
        /* DOWNLOAD SECTION */
        .download-container {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .download-container a {
            text-decoration: none;
        }

        .download-container button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            cursor: pointer;
            margin-right: 12px;
            transition: all 0.25s ease;
            font-weight: 500;
        }

        .download-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>📊 Reconciliation Results</h2>

        <!-- UI ONLY CARDS -->


        <div class="cards">

            <div class="card total">
                <div class="title">Total</div>
                <div class="value">{{ summary.total }}</div>
            </div>

            <div class="card matched">
                <div class="title">Matched</div>
                <div class="value">{{ summary.matched }}</div>
            </div>

            <div class="card mismatch">
                <div class="title">Mismatch</div>
                <div class="value">{{ summary.mismatched }}</div>
            </div>

            <div class="card unmatched">
                <div class="title">Missing in Excel</div>
                <div class="value">{{ summary.unmatch_excel }}</div>
            </div>

            <div class="card unmatched">
                <div class="title">Missing in TXT</div>
                <div class="value">{{ summary.unmatch_text }}</div>
            </div>

            <div class="card amount">
                <div class="title">Mismatch Amount</div>
                <div class="value">₹{{ summary.difference }}</div>
            </div>

        </div>

        <div class="download-container">
            <a href="/download_uploaded">
                <button>Download File</button>
            </a>
        </div>

        <!-- BACK -->
        <a href="/" class="back">⬅ Back</a>

    </div>

</body>

</html>
